syntax = "proto3";

package org.pytenix.proto;

option java_package = "org.pytenix.proto.generated";
option java_outer_classname = "NetworkPackets";


message ServerConfiguration {
  string license_key = 1;
  string default_language = 2;
  ConsentMode consentMode = 3;
  repeated Module active_modules = 4; // Liste aller Module, die auf 'true' stehen
  repeated string words = 5;
}

message GeoRequestPacket
{
  fixed64 request_id_most_sig = 1;
  fixed64 request_id_least_sig = 2;
  string ip_address = 3;
}

message GeoResultPacket
{
  fixed64 request_id_most_sig = 1;
  fixed64 request_id_least_sig = 2;
  string language = 3;
}


message ConfigRequestPacket {
  int64 timestamp = 1;
}

message TranslationRequest {
  fixed64 request_id_most_sig = 1;
  fixed64 request_id_least_sig = 2;
  string text = 3;
  string target_lang = 4;
  Module module = 5;
}

message ProfilePacket {
  enum Action {
    FETCH = 0;   // Proxy/Spigot fragt Profil an (Backend soll lesen)
    UPDATE = 1;  // Proxy/Spigot sendet Änderung (Backend soll speichern)
    RESPONSE = 2;// Backend antwortet mit den Daten an den Proxy/Spigot
  }

  enum ConsentType
  {
    UNKNOWN = 0;
    EXPLICIT = 1;
    AUTO = 2;
    DECLINED = 3;
  }

  Action action = 1;
  fixed64 request_id_most_sig = 2;
  fixed64 request_id_least_sig = 3;

  fixed64 user_id_most_sig = 4;
  fixed64 user_id_least_sig = 5;

  ConsentType consentType = 6;
}


message TranslationResult {
  fixed64 request_id_most_sig = 1;
  fixed64 request_id_least_sig = 2;
  string result = 3;
}

enum ConsentMode {
  CONSENT_UNKNOWN = 0;
  CONSENT_STRICT = 1;
  CONSENT_EXTERNAL = 2;
  CONSENT_AUTO_OPT = 3;
}


enum Module {
  MODULE_UNKNOWN = 0;
  MODULE_LIVE_CHAT = 1;
  MODULE_GUI = 2;
  MODULE_HOLOGRAM = 3;
  MODULE_PLUGIN_CHAT = 4;
  MODULE_SIGNS = 5;
  MODULE_MOTD = 6;
}

message PacketWrapper {
  oneof payload {
    ServerConfiguration config = 1;
    ConfigRequestPacket config_request = 2;
    GeoRequestPacket geo_request = 3;
    GeoResultPacket geo_result = 4;
    TranslationRequest translation_request = 5;
    TranslationResult translation_result = 6;

  }
}
syntax = "proto3";

package org.pytenix.proto;

option java_package = "org.pytenix.proto.generated";
option java_outer_classname = "NetworkPackets";


message ServerConfiguration {
  string license_key = 1;
  string default_language = 2;
  map<string, bool> modules = 3;
  repeated string words = 4;
}

message GeoBatchRequest {
  repeated GeoRequestPacket requests = 1;
}

message GeoBatchResult {
  repeated GeoResultPacket results = 1;
}





message GeoRequestPacket
{
  bytes request_id = 1;
  string ip_address = 2;
}

message GeoResultPacket
{
  bytes request_id = 1;
  string language = 2;
}



message ConfigRequestPacket {
  int64 timestamp = 1;
}

message TranslationRequest {
  bytes request_id = 1;
  string text = 2;
  string target_lang = 3;
  string module = 4;
}


message TranslationBatchRequest {
  string origin_server = 1;
  repeated TranslationRequest requests = 2;
}



message TranslationBatchResult {
  string origin_server = 1;
  repeated TranslationResult results = 2;
}

message TranslationResult {
  bytes request_id = 1;
  string result = 2;
}



message Chunk {
  string transmission_id = 1;
  int32 part_index = 2;
  int32 total_parts = 3;
  bytes data = 4;
}


message PacketWrapper {
  oneof payload {
    TranslationBatchRequest batch_request = 1;
    TranslationBatchResult batch_result = 2;
    Chunk chunk = 3;
    ServerConfiguration config = 4;
    ConfigRequestPacket config_request = 5;
    GeoBatchRequest geo_batch_request = 7;
    GeoBatchResult geo_batch_result = 8;
  }
}
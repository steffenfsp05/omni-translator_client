syntax = "proto3";

package org.pytenix.proto;

option java_package = "org.pytenix.proto.generated";
option java_outer_classname = "NetworkPackets";


message ServerConfiguration {
  string license_key = 1;
  string default_language = 2;
  map<string, bool> modules = 3;
  repeated string words = 4;
}

message GeoRequestPacket
{
  bytes request_id = 1;
  string ip_address = 2;
}

message GeoResultPacket
{
  bytes request_id = 1;
  string language = 2;
}


message ConfigRequestPacket {
  int64 timestamp = 1;
}

message TranslationRequest {
  bytes request_id = 1;
  string text = 2;
  string target_lang = 3;
  string module = 4;
}


message TranslationResult {
  bytes request_id = 1;
  string result = 2;
}


message Chunk {
  string transmission_id = 1;
  int32 part_index = 2;
  int32 total_parts = 3;
  bytes data = 4;
}


message PacketWrapper {
  oneof payload {
    ServerConfiguration config = 1;
    ConfigRequestPacket config_request = 2;
    GeoRequestPacket geo_request = 3;
    GeoResultPacket geo_result = 4;
    TranslationRequest translation_request = 5;
    TranslationResult translation_result = 6;
    Chunk chunk = 7;

  }
}